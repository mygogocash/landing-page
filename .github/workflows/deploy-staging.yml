# Deploy Landing Page to Firebase Hosting — staging site (staging.gogocash.co).
# Triggered on push to the `staging` branch.
#
# ─── Prerequisites ───
#   1. Create a Firebase Hosting site named `gogocash-landing-staging` in the
#      landing-page-4ae23 project (Firebase Console → Hosting → Add another site).
#   2. Add custom domain staging.gogocash.co to that site.
#   3. Add a DNS CNAME  staging  →  gogocash-landing-staging.web.app  in your registrar.
#
# ─── Required secrets ───
#   FIREBASE_SERVICE_ACCOUNT_LANDING_STAGING   JSON key for a GCP service account with
#                                               Firebase Hosting Admin on landing-page-4ae23.
#   (Optional) INVOLVE_ASIA_API_KEY / INVOLVE_ASIA_API_SECRET  — partner data at build time.

name: Deploy Landing Page (staging)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: landing-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FIREBASE_PROJECT_ID: landing-page-4ae23
  FIREBASE_HOSTING_SITE: gogocash-landing-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build static site
        run: npm run build
        env:
          INVOLVE_ASIA_API_KEY: ${{ secrets.INVOLVE_ASIA_API_KEY }}
          INVOLVE_ASIA_API_SECRET: ${{ secrets.INVOLVE_ASIA_API_SECRET }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e:ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LANDING_STAGING }}

      - name: Deploy to Firebase Hosting (staging site)
        run: |
          npx firebase-tools deploy --only hosting:${{ env.FIREBASE_HOSTING_SITE }} \
            --project ${{ env.FIREBASE_PROJECT_ID }} \
            --non-interactive
