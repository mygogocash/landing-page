# Build Next.js static export and deploy to Firebase Hosting.
# Auth is handled through GitHub OIDC + Google Workload Identity Federation.

name: Build and deploy landing

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # Optional Strapi for /learn: set STRAPI_URL (+ STRAPI_API_TOKEN if needed) in repo secrets
      # and add them under env below — see docs/learn-content.md
      - name: Build static site
        run: npm run build
        env:
          # Optional: Involve Asia (server-side at build time for partner data)
          INVOLVE_ASIA_API_KEY: ${{ secrets.INVOLVE_ASIA_API_KEY }}
          INVOLVE_ASIA_API_SECRET: ${{ secrets.INVOLVE_ASIA_API_SECRET }}

      # WebKit needs GTK/GStreamer/etc. on Ubuntu; without --with-deps, launch fails with missing .so (CI).
      - name: Install Playwright (browsers + system dependencies)
        run: npx playwright install --with-deps chromium webkit

      - name: E2E (served from out/)
        run: npm run test:e2e:ci

      - name: Upload Static Artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-page-out
          path: out
          if-no-files-found: error
          retention-days: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/110817639529/locations/global/workloadIdentityPools/github-actions/providers/mygogocash-landing-page
          service_account: github-action-firebase-deploy@landing-page-4ae23.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_PROJECT_ID: landing-page-4ae23
          FIREBASE_HOSTING_SITES: landing-page-4ae23
        run: node scripts/deploy-firebase-hosting.mjs
